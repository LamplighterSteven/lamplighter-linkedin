<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamplighter — LinkedIn Prompt Generator</title>
<link href="https://use.typekit.net/bgl8czr.css" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-mid: #555;
    --ink-light: #999;
    --paper: #faf8f4;
    --paper-warm: #f3f0ea;
    --paper-border: #e5e0d5;
    --gold: #c9a84c;
    --gold-light: #f5efd6;
    --attract: #2d6a4f;
    --attract-bg: #e8f5ee;
    --serve: #1a4a8a;
    --serve-bg: #e8eefc;
    --sell: #8a3a1a;
    --sell-bg: #fceee8;
    --font-brand: "brandon-grotesque", sans-serif;
    --font-body: "brandon-grotesque", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  .page {
    max-width: 700px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* Header */
  .masthead {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--paper-border);
  }
  .wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.3px;
    color: var(--ink);
  }
  .wordmark span { color: var(--gold); }
  .datestamp {
    font-size: 12px;
    color: var(--ink-light);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Type selector */
  .section-label {
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .type-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 28px;
  }

  .type-btn {
    background: var(--paper-warm);
    border: 1px solid var(--paper-border);
    border-radius: 6px;
    padding: 14px 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .type-btn:hover { border-color: var(--ink-light); background: white; }
  .type-btn .type-name { font-size: 14px; font-weight: 500; color: var(--ink); display: block; margin-bottom: 4px; }
  .type-btn .type-desc { font-size: 11px; color: var(--ink-light); display: block; line-height: 1.4; }

  .type-btn.selected-attract { background: var(--attract-bg); border-color: var(--attract); }
  .type-btn.selected-attract .type-name { color: var(--attract); }
  .type-btn.selected-serve { background: var(--serve-bg); border-color: var(--serve); }
  .type-btn.selected-serve .type-name { color: var(--serve); }
  .type-btn.selected-sell { background: var(--sell-bg); border-color: var(--sell); }
  .type-btn.selected-sell .type-name { color: var(--sell); }

  /* Bucket selector */
  .bucket-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 28px;
  }

  .bucket-chip {
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--paper-border);
    background: white;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
  }
  .bucket-chip:hover { border-color: var(--ink-light); color: var(--ink); }
  .bucket-chip.selected { background: var(--ink); color: white; border-color: var(--ink); }
  .bucket-chip.general { border-style: dashed; }
  .bucket-chip.general.selected { background: var(--ink); color: white; border-color: var(--ink); border-style: solid; }

  /* Context input */
  .context-area {
    margin-bottom: 24px;
  }
  .context-input {
    width: 100%;
    background: white;
    border: 1px solid var(--paper-border);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    resize: none;
    height: 72px;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  .context-input:focus { outline: none; border-color: var(--gold); }
  .context-input::placeholder { color: var(--ink-light); }

  /* Generate button */
  .generate-btn {
    width: 100%;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .generate-btn:hover { background: #333; transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn:disabled { background: var(--ink-light); cursor: not-allowed; transform: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .generate-btn.loading .spinner { display: block; }
  .generate-btn.loading .btn-label { opacity: 0.7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Output card */
  .output-card {
    background: white;
    border: 1px solid var(--paper-border);
    border-radius: 12px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
    display: none;
  }
  .output-card.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  .output-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--paper-border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--paper-warm);
  }

  .type-pill {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.4px;
    padding: 4px 12px;
    border-radius: 99px;
    text-transform: uppercase;
  }
  .pill-attract { background: var(--attract-bg); color: var(--attract); }
  .pill-serve { background: var(--serve-bg); color: var(--serve); }
  .pill-sell { background: var(--sell-bg); color: var(--sell); }

  .bucket-label {
    font-size: 12px;
    color: var(--ink-light);
  }

  .output-body { padding: 24px 24px 20px; }

  .prompt-heading {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    line-height: 1.45;
    color: var(--ink);
    margin-bottom: 16px;
    min-height: 60px;
  }

  .guidance-block {
    background: var(--gold-light);
    border-left: 3px solid var(--gold);
    border-radius: 0 6px 6px 0;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--ink-mid);
    line-height: 1.6;
    margin-bottom: 20px;
    min-height: 40px;
  }

  .output-actions {
    display: flex;
    gap: 8px;
    padding: 16px 24px;
    border-top: 1px solid var(--paper-border);
    background: var(--paper-warm);
  }

  .action-btn {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid var(--paper-border);
    background: white;
    color: var(--ink);
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--ink-light); background: var(--paper-warm); }
  .action-btn.primary { background: var(--ink); color: white; border-color: var(--ink); }
  .action-btn.primary:hover { background: #333; }
  .action-btn.copied { background: var(--attract-bg); color: var(--attract); border-color: var(--attract); }

  .algo-block {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--paper-border);
  }
  .algo-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 500;
    margin-bottom: 10px;
  }
  .algo-tips { list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .algo-tips li {
    font-size: 13px;
    color: var(--ink-mid);
    line-height: 1.5;
    padding-left: 18px;
    position: relative;
  }
  .algo-tips li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 7px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
  }
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--gold);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Draft post panel */
  .draft-btn {
    width: 100%;
    background: var(--gold-light);
    color: var(--ink);
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 13px;
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .draft-btn:hover { background: #ecdeb0; }
  .draft-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .draft-spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.15);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .draft-btn.loading .draft-spinner { display: block; }
  .draft-btn.loading .draft-label { opacity: 0.7; }
  .draft-card {
    background: white;
    border: 1px solid var(--gold);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
    display: none;
  }
  .draft-card.visible { display: block; }
  .draft-header {
    padding: 12px 18px;
    background: var(--gold-light);
    border-bottom: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .draft-header-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ink-mid);
    font-weight: 500;
  }
  .draft-char-count { font-size: 11px; color: var(--ink-light); }
  .draft-textarea {
    width: 100%;
    padding: 18px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.7;
    border: none;
    resize: vertical;
    min-height: 220px;
    background: white;
  }
  .draft-textarea:focus { outline: none; }
  .draft-actions {
    display: flex;
    gap: 6px;
    padding: 12px 18px;
    border-top: 1px solid var(--paper-border);
    background: var(--paper-warm);
  }

  /* Used badge */
  .used-badge {
    margin-left: auto;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: var(--attract-bg);
    color: var(--attract);
    border: 1px solid var(--attract);
    border-radius: 99px;
    padding: 3px 10px;
  }
  .action-btn.mark-used-btn {
    color: var(--attract);
    border-color: var(--attract);
  }
  .action-btn.mark-used-btn.is-used {
    background: var(--attract-bg);
    color: var(--attract);
    border-color: var(--attract);
  }

  /* History used/unused */
  .history-item.used {
    border-color: var(--attract);
    background: var(--attract-bg);
    opacity: 0.75;
  }
  .history-item.unused {
    background: white;
    border-color: var(--paper-border);
  }
  .h-used-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .history-item.used .h-used-dot { background: var(--attract); }
  .history-item.unused .h-used-dot { background: var(--paper-border); border: 1px solid var(--ink-light); }

  /* Error */
  .error-msg {
    background: var(--sell-bg);
    border: 1px solid #e8a898;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    color: var(--sell);
    margin-bottom: 20px;
    display: none;
  }

  /* History strip */
  .history-section { margin-top: 40px; }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item {
    background: var(--paper-warm);
    border: 1px solid var(--paper-border);
    border-radius: 8px;
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--ink-light); }
  .history-item .h-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; }
  .history-item .h-text { font-size: 13px; color: var(--ink-mid); line-height: 1.4; }
  .history-item .h-type { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .h-type-attract { color: var(--attract); }
  .h-type-serve { color: var(--serve); }
  .h-type-sell { color: var(--sell); }
</style>
</head>
<body>
<div class="page">

  <div class="masthead">
    <div class="wordmark">Lamp<span>lighter</span> <span style="color:var(--ink-light);font-size:16px;">LinkedIn</span></div>
    <div class="datestamp" id="datestamp"></div>
  </div>

  <!-- Post type -->
  <div class="section-label">Post type</div>
  <div class="type-grid">
    <button class="type-btn selected-attract" data-type="attract" onclick="selectType('attract', this)">
      <span class="type-name">Attract</span>
      <span class="type-desc">Human, personal, relatable</span>
    </button>
    <button class="type-btn" data-type="serve" onclick="selectType('serve', this)">
      <span class="type-name">Serve</span>
      <span class="type-desc">Insight, expertise, value</span>
    </button>
    <button class="type-btn" data-type="sell" onclick="selectType('sell', this)">
      <span class="type-name">Sell</span>
      <span class="type-desc">Direct offer, services, CTA</span>
    </button>
  </div>

  <!-- Bucket -->
  <div class="section-label">Topic bucket</div>
  <div class="bucket-row" id="bucket-row"></div>

  <!-- Context -->
  <div class="context-area">
    <div class="section-label">Context or steer <span style="font-weight:300;text-transform:none;letter-spacing:0;color:var(--ink-light);font-size:11px;">(optional — e.g. "just attended an event in Manchester" or "thinking about AI in hiring")</span></div>
    <textarea class="context-input" id="context-input" placeholder="Add anything topical, a recent experience, or a specific angle you want to explore..."></textarea>
  </div>

  <!-- Generate -->
  <button class="generate-btn" id="gen-btn" onclick="generate()">
    <div class="spinner"></div>
    <span class="btn-label">Generate prompt</span>
  </button>

  <!-- Error -->
  <div class="error-msg" id="error-msg"></div>

  <!-- Output -->
  <div class="output-card" id="output-card">
    <div class="output-header">
      <span class="type-pill" id="out-pill">Attract</span>
      <span class="bucket-label" id="out-bucket">Steven</span>
      <span class="used-badge" id="out-used-badge" style="display:none;">Used</span>
    </div>
    <div class="output-body">
      <div class="prompt-heading" id="out-prompt"></div>
      <div class="guidance-block" id="out-guidance"></div>
      <div class="algo-block" id="algo-block" style="display:none;">
        <div class="algo-label">LinkedIn algorithm tips</div>
        <ul class="algo-tips" id="algo-tips"></ul>
      </div>
    </div>
    <div class="output-actions">
      <button class="action-btn" onclick="copyPrompt()">Copy prompt</button>
      <button class="action-btn" onclick="copyFull()">Copy with guidance</button>
      <button class="action-btn mark-used-btn" id="mark-used-btn" onclick="markCurrentUsed()">Mark as used</button>
      <button class="action-btn primary" onclick="generate()">Regenerate</button>
    </div>
  </div>

  <!-- Draft post -->
  <button class="draft-btn" id="draft-btn" onclick="draftPost()" style="display:none;">
    <div class="draft-spinner"></div>
    <span class="draft-label">✍️ Draft this post for me</span>
  </button>

  <div class="draft-card" id="draft-card">
    <div class="draft-header">
      <span class="draft-header-label">Draft post — edit before publishing</span>
      <span class="draft-char-count" id="draft-char-count">0 chars</span>
    </div>
    <textarea class="draft-textarea" id="draft-textarea" oninput="updateCharCount()" placeholder="Your draft will appear here..."></textarea>
    <div class="draft-actions">
      <button class="action-btn" onclick="copyDraft()">Copy post</button>
      <button class="action-btn mark-used-btn" onclick="markCurrentUsed()">Mark as used</button>
      <button class="action-btn primary" onclick="draftPost()">Redraft</button>
    </div>
  </div>

  <!-- History -->
  <div class="history-section" id="history-section" style="display:none;">
    <div class="section-label" style="margin-bottom:12px;">Prompt history</div>
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<script>
const BUCKETS = {
  attract: ["Steven", "Lamplighter"],
  serve: ["Culture", "Capability", "Careers", "Lamplighter"],
  sell: ["Lamplighter"]
};

const ALL_BUCKETS = ["Steven", "Lamplighter", "Culture", "Capability", "Careers", "General"];

const BUCKET_SUBTOPICS = {
  Steven: "Fitness, Poppy/Matisse (dogs), Books/Audiobooks, Language Learning, Walks & Routine, personal life",
  Lamplighter: "Networking & Events, Career & Experience, Working for myself, Personal development, Where I am this week, business updates, consultancy life",
  Culture: "EVP & Values, Employer Brand, Careers Websites, Effective Storytelling, Candidate Experience",
  Capability: "Recruitment Data, Recruitment Tech, Strategic vs. Tactical, Industry Insights, AI/SEO/GEO in recruitment",
  Careers: "Career Development, Getting the next job, Interview prepping, Confidence, Internal networking",
  General: "Universal, industry-agnostic prompts that any professional could use and adapt to their own field"
};

let selectedType = "attract";
let selectedBucket = "Steven";
let history = [];

function setDate() {
  const d = new Date();
  document.getElementById('datestamp').textContent = d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
}

function renderBuckets() {
  const row = document.getElementById('bucket-row');
  row.innerHTML = '';
  ALL_BUCKETS.forEach(b => {
    const chip = document.createElement('button');
    chip.className = 'bucket-chip' + (b === 'General' ? ' general' : '') + (b === selectedBucket ? ' selected' : '');
    chip.textContent = b;
    chip.onclick = () => selectBucket(b, chip);
    row.appendChild(chip);
  });
}

function selectType(type, btn) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.className = 'type-btn';
  });
  btn.className = 'type-btn selected-' + type;
  // Auto-select sensible default bucket
  const defaults = { attract: 'Steven', serve: 'Culture', sell: 'Lamplighter' };
  selectBucketByName(defaults[type]);
}

function selectBucket(name, chip) {
  selectedBucket = name;
  document.querySelectorAll('.bucket-chip').forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
}

function selectBucketByName(name) {
  selectedBucket = name;
  document.querySelectorAll('.bucket-chip').forEach(c => {
    c.classList.toggle('selected', c.textContent === name);
  });
}

async function generate() {
  const btn = document.getElementById('gen-btn');
  const errorEl = document.getElementById('error-msg');
  const context = document.getElementById('context-input').value.trim();

  btn.disabled = true;
  btn.classList.add('loading');
  btn.querySelector('.btn-label').textContent = 'Generating...';
  errorEl.style.display = 'none';

  const typeDescriptions = {
    attract: "An ATTRACT post — human, personal, relatable content that lets people see Steven as a person. These posts are NOT about expertise or selling. Examples: a dog walk, attending an event, a book he's reading, something personal about his routine or life. Low on knowledge-sharing, high on humanity and warmth.",
    serve: "A SERVE post — educational, insightful content that delivers genuine value to Steven's audience. These share expertise, analysis, opinions, frameworks, or practical advice. Examples: 'here is my analysis of...', 'something I see in my clients often is...', a checklist, a perspective on an industry trend.",
    sell: "A SELL post — a direct, clear post about Steven's services and how to work with him. These are deliberately low on engagement-bait and high on clarity about what he offers. Examples: 'here are the ways you can work with me', a case study CTA, a direct invitation to DM."
  };

  const isGeneral = selectedBucket === "General";

  const generalPromptStyles = {
    attract: `Universal ATTRACT prompt styles (pick one and make it feel fresh and specific):
- Ask for help with something (recommendations, suggestions, referrals)
- Write a public testimonial for someone
- Share something you're looking forward to
- Share something you're grateful for
- Something most people don't know about you
- An assumption people make about you that isn't true
- Something that annoys you (keep it LIGHT)
- A bad habit you have in your business or life
- Throwback Thursday / a year ago (a past pic, memory, milestone)
- A quote and WHY it resonates with you
- Start with a confession
- Lesson from the weekend
- What's a goal you're currently working on
- A book that changed your life
- What's your guilty pleasure and why it's actually awesome
- Something you used to NOT want people to know about you
- Something about your background that might surprise people
- A podcast, interview, or TED talk you love and what made it impactful
- What I'd tell myself X years ago
- Ask people for their opinion on something (should I do X or Y)
- An example of a mistake or failure you had
- Do an intro post for new connections`,
    serve: `Universal SERVE prompt styles (pick one and make it feel fresh and specific):
- Start with 'did you know'
- 3 ways to...
- A common problem your ideal client has (just one, with one solution or a different perspective)
- Share 1 or 3 actionable steps that will get someone 1% closer to a goal
- My opinion on...
- Why I believe...
- The number 1 question you ask new clients (give a peek into what it's like to work with you)
- A checklist for something useful for your ideal person
- Share a breakthrough from a recent client call or project and how others can apply it
- Why would someone NOT do the things you help people to do
- What's something surprising about the way you work with people
- A mistake your ideal person is making (something they're doing or thinking wrong)
- What is your ideal person's biggest objection to reaching out (time/money/fear) and give a different perspective
- When it comes to XYZ I wish people would stop...
- Life before and after (what it is you do)`,
    sell: `Universal SELL prompt styles (pick one and make it feel fresh and specific):
- How you can work with me (list the ways)
- Why me (something that makes the way you work different)
- A result or outcome I'm proud of
- Share a testimonial
- If you are done with XYZ (name the pain) then DM me
- A case study
- Why NOW is the time to work with you / DM you
- If you want XYZ (specific goal) then DM me
- Write a short clear post: If you are [specific person] and want to [main goal], drop me a DM
- This is an invitation for XYZ person who wants ABC outcome — DM me
- I'm looking for 5 [type of] people/companies who want [outcome]
- I created this / I do this / because...
- This [thing you do] is for the person who is done with [list pain points]
- This [thing you do] is for the person who is ready for [list goals]
- FAQs about working with you
- Who specifically you work with and enjoy helping
- Picture this / Imagine it's X time later and you are...`
  };

  const jsonSchema = '{"prompt":"...","guidance":"...","algo":["length tip","media tip","engagement tip"]}';

  const systemPrompt = isGeneral
    ? "You are a LinkedIn content strategist. Your task is to generate ONE universal LinkedIn post prompt — something any professional in any industry could pick up and adapt to their own context. The prompt should not reference any specific industry, company, or niche.\n\n" +
      "Post type context:\n" +
      "- ATTRACT: Human, personal, relatable. Not about expertise or selling. About the person behind the work.\n" +
      "- SERVE: Educational, insightful, delivers genuine value. Expertise, opinions, frameworks, practical advice.\n" +
      "- SELL: Direct and clear about services. Low engagement-bait, high clarity. Invites people to reach out.\n\n" +
      "Return ONLY a valid JSON object with these exact keys, no markdown, no backticks, no preamble:\n" +
      "prompt: A single clear sentence or question as a starting point. Written in second person. Use placeholders like [your field] or [your clients] for any industry references.\n" +
      "guidance: 2-3 sentences on the angle, tone, and what makes this post format work well on LinkedIn.\n" +
      "algo: An array of exactly 3 strings — (1) ideal post length advice for this type, (2) what media works best and why, (3) one more specific algorithm or engagement tip about hooks, timing, comments, or CTAs."
    : "You are a LinkedIn content strategist helping Steven, founder of Lamplighter Digital, a talent acquisition consultancy focused on the hospitality sector.\n\n" +
      "Steven's goal: build personal brand and a go-to reputation in recruitment marketing, talent attraction and talent acquisition. To book clients, speaking gigs and events.\n\n" +
      "His five content buckets:\n" +
      "- STEVEN (About Me): " + BUCKET_SUBTOPICS.Steven + "\n" +
      "- LAMPLIGHTER (My Business Life): " + BUCKET_SUBTOPICS.Lamplighter + "\n" +
      "- CULTURE (Incl. Experience): " + BUCKET_SUBTOPICS.Culture + "\n" +
      "- CAPABILITY (Best Practices): " + BUCKET_SUBTOPICS.Capability + "\n" +
      "- CAREERS (Cause I Care About): " + BUCKET_SUBTOPICS.Careers + "\n\n" +
      "His post type framework:\n" +
      "- ATTRACT (2x/week): " + typeDescriptions.attract + "\n" +
      "- SERVE (2x/week): " + typeDescriptions.serve + "\n" +
      "- SELL (1x/week): " + typeDescriptions.sell + "\n\n" +
      "Return ONLY a valid JSON object with these exact keys, no markdown, no backticks, no preamble:\n" +
      "prompt: A single clear sentence or question giving Steven a concrete starting point for writing.\n" +
      "guidance: 2-3 sentences on the angle, tone advice, and practical tips for execution.\n" +
      "algo: An array of exactly 3 strings — (1) ideal post length advice for this type and why it works on LinkedIn, (2) what media works best and why, (3) one more specific algorithm or engagement tip about hooks, timing, comments, or CTAs.\n\n" +
      "The prompt should be specific and inspiring, tailored to Steven's voice and business. Do not write the post itself.";

  const userMsg = isGeneral
    ? `Post type: ${selectedType.toUpperCase()}
${context ? `Optional steer from the user: ${context}` : ''}

Draw inspiration from these proven prompt styles for ${selectedType} posts:
${generalPromptStyles[selectedType]}

Pick one of these styles as your starting point but make the output feel fresh, specific, and ready to use. Do not just copy the style verbatim — craft it into a proper, actionable prompt.`
    : `Post type: ${selectedType.toUpperCase()}
Bucket: ${selectedBucket} (subtopics: ${BUCKET_SUBTOPICS[selectedBucket]})
${context ? `Additional context from Steven: ${context}` : 'No additional context — generate based on the bucket and type.'}

Generate one LinkedIn post prompt for the ${selectedType} category using the ${selectedBucket} bucket.`;

  try {
    const response = await fetch("https://linkedin-prompt-proxy.steven-6f9.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userMsg }]
      })
    });

    const data = await response.json();

    if (!response.ok || data.error) {
      throw new Error('Worker/API responded: ' + JSON.stringify(data));
    }

    const raw = data.content?.[0]?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    showOutput(parsed.prompt, parsed.guidance, parsed.algo || []);
    addToHistory(parsed.prompt, parsed.guidance, parsed.algo || []);

  } catch (err) {
    errorEl.textContent = 'Error: ' + err.message;
    errorEl.style.display = 'block';
  }

  btn.disabled = false;
  btn.classList.remove('loading');
  btn.querySelector('.btn-label').textContent = 'Generate prompt';
}

function showOutput(prompt, guidance, algo) {
  const card = document.getElementById('output-card');
  const pill = document.getElementById('out-pill');
  const bucketEl = document.getElementById('out-bucket');

  pill.textContent = selectedType.charAt(0).toUpperCase() + selectedType.slice(1);
  pill.className = 'type-pill pill-' + selectedType;
  bucketEl.textContent = selectedBucket;

  document.getElementById('out-prompt').textContent = prompt;
  document.getElementById('out-guidance').textContent = guidance;

  const algoBlock = document.getElementById('algo-block');
  const algoList = document.getElementById('algo-tips');
  if (algo && algo.length) {
    algoList.innerHTML = algo.map(tip => `<li>${tip}</li>`).join('');
    algoBlock.style.display = 'block';
  } else {
    algoBlock.style.display = 'none';
  }

  card.style.display = 'block';
  requestAnimationFrame(() => card.classList.add('visible'));
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Show draft button, hide previous draft
  document.getElementById('draft-btn').style.display = 'flex';
  document.getElementById('draft-card').style.display = 'none';

  // Reset used badge and button for new prompt
  const badge = document.getElementById('out-used-badge');
  badge.style.display = 'none';
  document.querySelectorAll('.mark-used-btn').forEach(b => {
    b.textContent = 'Mark as used';
    b.classList.remove('is-used');
  });
}

function addToHistory(prompt, guidance, algo) {
  const id = Date.now().toString();
  currentHistoryId = id;
  history.unshift({ id, type: selectedType, bucket: selectedBucket, prompt, guidance, algo, used: false });
  if (history.length > 20) history.pop();
  saveHistory();
  renderHistory();
}

function saveHistory() {
  try { localStorage.setItem('ll_history', JSON.stringify(history)); } catch(e) {}
}

function loadHistory() {
  try { const r = localStorage.getItem('ll_history'); return r ? JSON.parse(r) : []; } catch(e) { return []; }
}

function renderHistory() {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  if (history.length < 2) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = '';

  // Sort: unused first, then used (but keep insertion order within each group)
  const unused = history.slice(1).filter(i => !i.used);
  const used = history.slice(1).filter(i => i.used);
  const sorted = [...unused, ...used];

  sorted.forEach(item => {
    const el = document.createElement('div');
    el.className = 'history-item ' + (item.used ? 'used' : 'unused');
    el.innerHTML =
      '<div class="h-meta" style="display:flex;gap:8px;align-items:flex-start;margin-bottom:5px;">' +
        '<div class="h-used-dot" style="margin-top:4px;"></div>' +
        '<div style="flex:1;">' +
          '<div style="display:flex;gap:6px;align-items:center;margin-bottom:3px;">' +
            '<span class="h-type h-type-' + item.type + '">' + item.type + '</span>' +
            '<span style="color:var(--ink-light);font-size:10px;">' + item.bucket + '</span>' +
            '<span style="margin-left:auto;font-size:10px;color:' + (item.used ? 'var(--attract)' : 'var(--ink-light)') + ';">' + (item.used ? '✓ used' : 'unused') + '</span>' +
          '</div>' +
          '<div class="h-text">' + item.prompt + '</div>' +
        '</div>' +
      '</div>';
    el.onclick = (e) => {
      if (e.target.closest('.toggle-used')) return;
      selectedType = item.type;
      selectedBucket = item.bucket;
      showOutput(item.prompt, item.guidance, item.algo || []);
      // Restore used state in header if applicable
      if (item.used) {
        document.getElementById('out-used-badge').style.display = 'inline-block';
        document.querySelectorAll('.mark-used-btn').forEach(b => {
          b.textContent = '✓ Used';
          b.classList.add('is-used');
        });
      }
      currentHistoryId = item.id;
    };
    el.ondblclick = () => toggleHistoryUsed(item.id);
    list.appendChild(el);
  });

  // Show summary
  const usedCount = history.filter(i => i.used).length;
  const total = history.length;
  const existingSummary = document.getElementById('history-summary');
  if (existingSummary) existingSummary.remove();
  const summary = document.createElement('div');
  summary.id = 'history-summary';
  summary.style.cssText = 'font-size:11px;color:var(--ink-light);margin-top:8px;text-align:right;';
  summary.innerHTML = '<strong style="color:var(--ink-mid);">' + usedCount + ' of ' + total + '</strong> prompts used';
  document.getElementById('history-section').appendChild(summary);
}

function copyPrompt() {
  const text = document.getElementById('out-prompt').textContent;
  navigator.clipboard.writeText(text);
  const btn = event.target;
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy prompt'; btn.classList.remove('copied'); }, 1800);
}

function copyFull() {
  const prompt = document.getElementById('out-prompt').textContent;
  const guidance = document.getElementById('out-guidance').textContent;
  navigator.clipboard.writeText(`PROMPT:\n${prompt}\n\nGUIDANCE:\n${guidance}`);
  const btn = event.target;
  btn.textContent = 'Copied!';
  setTimeout(() => { btn.textContent = 'Copy with guidance'; }, 1800);
}

// --- Posted tracker ---
const DAYS = ['Mon','Tue','Wed','Thu','Fri'];

function getWeekKey() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return d.getFullYear() + '-W' + week;
}

// --- Used / unused tracking ---
let currentHistoryId = null;

function markCurrentUsed() {
  if (!currentHistoryId) return;
  const item = history.find(i => i.id === currentHistoryId);
  if (!item) return;
  item.used = !item.used;
  saveHistory();
  renderHistory();
  const badge = document.getElementById('out-used-badge');
  badge.style.display = item.used ? 'inline-block' : 'none';
  document.querySelectorAll('.mark-used-btn').forEach(b => {
    b.textContent = item.used ? '✓ Used' : 'Mark as used';
    b.classList.toggle('is-used', item.used);
  });
}

function toggleHistoryUsed(id) {
  const item = history.find(i => i.id === id);
  if (!item) return;
  item.used = !item.used;
  saveHistory();
  renderHistory();
}

// --- Draft post ---
async function draftPost() {
  const prompt = document.getElementById('out-prompt').textContent;
  const guidance = document.getElementById('out-guidance').textContent;
  if (!prompt) return;

  const btn = document.getElementById('draft-btn');
  btn.disabled = true;
  btn.classList.add('loading');

  const draftSystem = "You are writing a LinkedIn post for Steven Miles, founder of Lamplighter Digital, a talent acquisition consultancy focused on the hospitality sector.\n\n" +
    "Steven's voice: warm, direct, conversational, confident without being arrogant. Knowledgeable but writes like a person, not a consultant. No corporate jargon, no buzzwords, no fluff. Short punchy sentences. The first line must stop the scroll — no preamble, no 'I've been thinking about...' openings. He uses line breaks for rhythm. Max 3 hashtags at the end if relevant, otherwise none.\n\n" +
    "ATTRACT posts: personal, human, about Steven as a person. Warm and relatable. Not salesy.\n" +
    "SERVE posts: genuine insight or expertise. Clear point of view. Delivers real value.\n" +
    "SELL posts: clear and direct. Short. Ends with a specific CTA to DM.\n\n" +
    "Write the full LinkedIn post based on the prompt and guidance. Write it ready to publish — no preamble, no explanation, just the post.";

  const draftMsg = "Post type: " + selectedType.toUpperCase() + "\nBucket: " + selectedBucket + "\n\nPrompt: " + prompt + "\nGuidance: " + guidance + "\n\nWrite the full LinkedIn post now.";

  try {
    const response = await fetch("https://linkedin-prompt-proxy.steven-6f9.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 1000,
        system: draftSystem,
        messages: [{ role: "user", content: draftMsg }]
      })
    });
    const data = await response.json();
    if (!response.ok || data.error) throw new Error(JSON.stringify(data));
    const draft = data.content?.[0]?.text || '';
    const ta = document.getElementById('draft-textarea');
    ta.value = draft;
    updateCharCount();
    const card = document.getElementById('draft-card');
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch(e) {
    const errorEl = document.getElementById('error-msg');
    errorEl.textContent = 'Draft error: ' + e.message;
    errorEl.style.display = 'block';
  }

  btn.disabled = false;
  btn.classList.remove('loading');
}

function updateCharCount() {
  const ta = document.getElementById('draft-textarea');
  const count = ta.value.length;
  const el = document.getElementById('draft-char-count');
  el.textContent = count + ' chars';
  el.style.color = count > 3000 ? 'var(--sell)' : count > 2000 ? 'var(--gold)' : 'var(--ink-light)';
}

function copyDraft() {
  navigator.clipboard.writeText(document.getElementById('draft-textarea').value);
  const btn = event.target;
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy post'; btn.classList.remove('copied'); }, 1800);
}

setDate();
renderBuckets();
history = loadHistory();
renderHistory();
